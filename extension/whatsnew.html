<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>What's new in Aura</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="welcome-bg"></div>
<div class="welcome">
  <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
    <select id="wlang" class="mini lang-sel">
      <option value="en">EN</option><option value="pt">PT</option><option value="es">ES</option>
    </select>
  </div>
  <div class="brandrow">
    <img src="icons/icon128.png" alt="Aura" />
    <div>
      <h1 style="margin:0">Aura <span id="ver" style="font-size:14px;color:var(--muted);font-weight:500"></span></h1>
      <p style="margin:0" data-k="tag">A new version is here.</p>
    </div>
  </div>

  <div class="card">
    <h2 data-k="newH">What's new</h2>
    <ul id="changes" class="changes"></ul>
  </div>

  <div class="card">
    <h2 data-k="nextH">Coming next</h2>
    <ul id="next" class="changes"></ul>
  </div>

  <a class="cta" href="#" onclick="window.close()" data-k="go">Awesome — close</a>
  <p class="muted small" style="margin-top:18px;text-align:center">
    <span data-k="madeBy">Made by</span>
    <a href="https://srzking.vercel.app" target="_blank" style="color:var(--brand)">SrKing</a>
  </p>
</div>
<script>
const D = {
  en: {
    tag: "v1.7 — Pause, streaks & richer dashboard.", newH: "What's new", nextH: "Coming next", go: "Awesome — close", madeBy: "Made by",
    changes: [
      "⏸ Pause tracking for 15 min, 1 hour, or until tomorrow — one click",
      "🔥 Daily streak counter & all-time total in the popup",
      "📊 Dashboard upgraded: 7-day chart, category breakdown, JSON export",
      "🎨 Profile-style Discord preview on the website (real elapsed timer)",
      "🌐 More platforms: Apple TV+, Hotstar, Yandex Music, Telegram, WhatsApp",
      "🖼️ Top-apps list now shows favicons inside the popup",
      "🐛 Stable Discord gateway: smoother reconnects, no presence flicker"
    ],
    next: ["Spotify desktop sync", "Custom emoji status", "Per-site presence templates", "Steam game detection", "Firefox build"]
  },
  pt: {
    tag: "v1.7 — Pausa, sequências e painel mais rico.", newH: "O que há de novo", nextH: "A caminho", go: "Fixe — fechar", madeBy: "Feito por",
    changes: [
      "⏸ Pausa o tracking por 15 min, 1 hora ou até amanhã — um clique",
      "🔥 Contador de sequência diária e total no popup",
      "📊 Painel novo: gráfico de 7 dias, divisão por categoria, exportar JSON",
      "🎨 Preview estilo perfil Discord no site (com timer real)",
      "🌐 Mais plataformas: Apple TV+, Hotstar, Yandex Music, Telegram, WhatsApp",
      "🖼️ Top apps mostra favicons dentro do popup",
      "🐛 Gateway Discord estável: reconexões mais suaves, sem flicker"
    ],
    next: ["Sincronização Spotify desktop", "Emoji personalizado", "Templates por site", "Deteção Steam", "Versão Firefox"]
  },
  es: {
    tag: "v1.7 — Pausa, rachas y panel más rico.", newH: "Novedades", nextH: "Próximamente", go: "Genial — cerrar", madeBy: "Hecho por",
    changes: [
      "⏸ Pausa el tracking 15 min, 1 hora o hasta mañana — un clic",
      "🔥 Contador de racha diaria y total en el popup",
      "📊 Panel nuevo: gráfico 7 días, desglose por categoría, exportar JSON",
      "🎨 Vista previa estilo perfil Discord en el sitio (con timer real)",
      "🌐 Más plataformas: Apple TV+, Hotstar, Yandex Music, Telegram, WhatsApp",
      "🖼️ Top apps muestra favicons dentro del popup",
      "🐛 Gateway Discord estable: reconexiones suaves, sin parpadeo"
    ],
    next: ["Sincronización Spotify desktop", "Emoji personalizado", "Plantillas por sitio", "Detección Steam", "Build Firefox"]
  }
};
async function apply(l){
  const d = D[l] || D.en;
  document.querySelectorAll("[data-k]").forEach(e=>{ if(typeof d[e.dataset.k]==="string") e.textContent = d[e.dataset.k]; });
  document.getElementById("changes").innerHTML = d.changes.map(c=>`<li>${c}</li>`).join("");
  document.getElementById("next").innerHTML = d.next.map(c=>`<li>${c}</li>`).join("");
  await chrome.storage?.local?.set?.({ lang:l });
}
(async()=>{
  const cfg = await chrome.storage?.local?.get?.(["lang"]) || {};
  let l = cfg.lang || (navigator.language||"en").slice(0,2);
  if(!D[l]) l="en";
  document.getElementById("wlang").value = l;
  document.getElementById("ver").textContent = "v" + (chrome.runtime.getManifest().version);
  apply(l);
  await chrome.storage?.local?.set?.({ lastSeenVersion: chrome.runtime.getManifest().version });
})();
document.getElementById("wlang").addEventListener("change", e=>apply(e.target.value));
</script>
</body>
</html>
