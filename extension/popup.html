<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="styles.css" />
</head>
<body class="popup">
  <header>
    <div class="logo">
      <img src="icons/icon128.png" alt="" />
      <strong>Aura</strong>
    </div>
    <div class="header-right">
      <select id="lang" class="mini lang-sel" title="Language">
        <option value="en">EN</option>
        <option value="pt">PT</option>
        <option value="es">ES</option>
      </select>
      <label class="switch" title="">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </label>
    </div>
  </header>

  <div id="updateBanner" class="update-banner hidden">
    <div>
      <strong data-i18n="updatedTitle">Aura was updated</strong>
      <div id="updateVer" class="muted small" style="margin:0"></div>
    </div>
    <button id="seeUpdate" class="primary" data-i18n="seeNew">See what's new</button>
  </div>

  <div id="botCard" class="bot-card hidden">
    <img id="botAvatar" alt="" />
    <div>
      <div class="muted small" data-i18n="loggedAs">Logged in as</div>
      <strong id="botName">—</strong>
    </div>
    <span id="botPing" class="pill on">●</span>
  </div>

  <div class="tabs">
    <button data-tab="now" data-i18n="now" class="active">Now</button>
    <button data-tab="account" data-i18n="account">Account</button>
    <button data-tab="custom" data-i18n="custom">Custom</button>
    <button data-tab="apps" data-i18n="apps">Apps</button>
    <button data-tab="logs" data-i18n="logs">Logs</button>
    <button data-tab="settings" data-i18n="settings">Settings</button>
    <button data-tab="about" data-i18n="about">About</button>
  </div>

  <section data-pane="now" class="pane active">
    <div class="status-row">
      <span id="statusPill" class="pill off" data-i18n="offline">offline</span>
      <select id="statusSel" class="mini">
        <option value="online" data-i18n="online">🟢 Online</option>
        <option value="idle" data-i18n="idle">🌙 Idle</option>
        <option value="dnd" data-i18n="dnd">⛔ Do Not Disturb</option>
        <option value="invisible" data-i18n="invisible">⚫ Invisible</option>
      </select>
    </div>
    <div class="now-card">
      <div class="now-head">
        <img id="actThumb" class="thumb hidden" alt="" />
        <div class="now-text">
          <div class="muted" data-i18n="nowShowing">Now showing</div>
          <div id="actName">—</div>
          <div id="actDetails" class="sub"></div>
          <div id="actState" class="sub"></div>
        </div>
      </div>
    </div>
    <div class="stats">
      <div><span class="muted small" data-i18n="todayTracked">Tracked today</span><strong id="todayMin">0</strong> <span data-i18n="minutes">min</span></div>
    </div>
    <div class="muted small" style="margin-top:10px" data-i18n="topApps">Top apps today</div>
    <div id="topApps" class="top-apps"></div>
    <button id="clear" class="ghost full" data-i18n="clearPresence">Clear presence</button>
  </section>

  <section data-pane="account" class="pane">
    <label data-i18n="userToken">Discord Token</label>
    <input id="token" type="password" placeholder="..." />
    <p class="muted small" data-i18n="userTokenHint">Your token logs you in as your own account so the activity appears on your profile.</p>
    <label><span data-i18n="appId">Application ID</span> <span class="muted" data-i18n="appIdHint">(optional, for images)</span></label>
    <input id="appId" type="text" placeholder="123456789012345678" />
    <button id="save" class="primary full" data-i18n="loginConnect">Login & Connect</button>
    <div id="loginStatus" class="login-status hidden"></div>
    <p class="hint"><span data-i18n="helpHint">Need help?</span> <a href="welcome.html" target="_blank" data-i18n="setupGuide">Read the setup guide →</a></p>
  </section>

  <section data-pane="custom" class="pane">
    <label data-i18n="customAct">Custom activity (overrides everything)</label>
    <input id="customText" type="text" data-i18n-ph="customPh" placeholder="e.g. Building cool stuff" />
    <label data-i18n="activityType">Activity type</label>
    <select id="customType">
      <option value="0" data-i18n="typePlaying">Playing</option>
      <option value="2" data-i18n="typeListening">Listening to</option>
      <option value="3" data-i18n="typeWatching">Watching</option>
      <option value="5" data-i18n="typeCompeting">Competing in</option>
    </select>
    <button id="saveCustom" class="primary full" data-i18n="apply">Apply</button>
    <button id="clearCustom" class="ghost full" data-i18n="removeOverride">Remove override</button>
  </section>

  <section data-pane="apps" class="pane">
    <p class="muted small" data-i18n="toggleSites">Toggle which sites are tracked.</p>
    <input id="appSearch" type="text" placeholder="Search…" class="search" />
    <div id="platformList" class="platform-list"></div>
  </section>

  <section data-pane="logs" class="pane">
    <div class="row">
      <button id="refreshLogs" class="ghost" data-i18n="refresh">Refresh</button>
      <button id="clearLogs" class="ghost" data-i18n="clearLogs">Clear logs</button>
    </div>
    <div id="logList" class="log-list"></div>
  </section>

  <section data-pane="settings" class="pane">
    <label class="check">
      <input id="idleAway" type="checkbox" />
      <span data-i18n="setIdle">Set status to idle when AFK</span>
    </label>
    <label class="check">
      <input id="skipIncognito" type="checkbox" />
      <span data-i18n="skipIncog">Don't track incognito tabs</span>
    </label>
    <label class="check">
      <input id="showButtons" type="checkbox" />
      <span data-i18n="showButtons">Show 'Open' button on activity</span>
    </label>
    <label class="check">
      <input id="showThumbnails" type="checkbox" />
      <span data-i18n="showThumbnails">Use page image as activity thumbnail</span>
    </label>
    <label class="check">
      <input id="notifyOnConnect" type="checkbox" />
      <span data-i18n="notifyConnect">Notify when connected</span>
    </label>
    <h3 class="muted small" style="margin-top:14px" data-i18n="manageSettings">Manage settings</h3>
    <div class="row">
      <button id="exportBtn" class="ghost" data-i18n="exportCfg">Export</button>
      <button id="importBtn" class="ghost" data-i18n="importCfg">Import</button>
      <input id="importFile" type="file" accept="application/json" hidden />
    </div>
    <button id="disconnectBtn" class="ghost full" data-i18n="disconnect">Disconnect</button>
    <button id="resetBtn" class="ghost full" data-i18n="resetAll" style="color:var(--red);border-color:rgba(237,66,69,.3)">Reset everything</button>
  </section>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
