<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="styles.css" />
</head>
<body class="popup">
  <header>
    <div class="logo">
      <img src="icons/icon128.png" alt="" />
      <strong>Aura</strong>
    </div>
    <label class="switch" title="Enable / disable">
      <input type="checkbox" id="enabled" />
      <span class="slider"></span>
    </label>
  </header>

  <div class="tabs">
    <button data-tab="now" class="active">Now</button>
    <button data-tab="account">Account</button>
    <button data-tab="custom">Custom</button>
    <button data-tab="apps">Apps</button>
    <button data-tab="settings">Settings</button>
  </div>

  <!-- NOW -->
  <section data-pane="now" class="pane active">
    <div class="status-row">
      <span id="statusPill" class="pill off">offline</span>
      <select id="statusSel" class="mini">
        <option value="online">🟢 Online</option>
        <option value="idle">🌙 Idle</option>
        <option value="dnd">⛔ Do Not Disturb</option>
        <option value="invisible">⚫ Invisible</option>
      </select>
    </div>
    <div class="now-card">
      <div class="muted">Now showing</div>
      <div id="actName">—</div>
      <div id="actDetails" class="sub"></div>
      <div id="actState" class="sub"></div>
    </div>
    <button id="clear" class="ghost full">Clear presence</button>
  </section>

  <!-- ACCOUNT -->
  <section data-pane="account" class="pane">
    <label>Bot Token</label>
    <input id="token" type="password" placeholder="MTk4..." />
    <label>Application ID <span class="muted">(for images)</span></label>
    <input id="appId" type="text" placeholder="123456789012345678" />
    <button id="save" class="primary full">Save & Connect</button>
    <p class="hint">Need help? <a href="welcome.html" target="_blank">Read the setup guide →</a></p>
  </section>

  <!-- CUSTOM -->
  <section data-pane="custom" class="pane">
    <label>Custom activity (overrides everything)</label>
    <input id="customText" type="text" placeholder="e.g. Building cool stuff" />
    <label>Activity type</label>
    <select id="customType">
      <option value="0">Playing</option>
      <option value="2">Listening to</option>
      <option value="3">Watching</option>
      <option value="5">Competing in</option>
    </select>
    <button id="saveCustom" class="primary full">Apply</button>
    <button id="clearCustom" class="ghost full">Remove override</button>
  </section>

  <!-- APPS -->
  <section data-pane="apps" class="pane">
    <p class="muted small">Toggle which sites are tracked.</p>
    <div id="platformList" class="platform-list"></div>
  </section>

  <!-- SETTINGS -->
  <section data-pane="settings" class="pane">
    <label class="check">
      <input id="idleAway" type="checkbox" />
      <span>Set status to idle when AFK</span>
    </label>
    <label class="check">
      <input id="skipIncognito" type="checkbox" />
      <span>Don't track incognito tabs</span>
    </label>
    <button id="disconnectBtn" class="ghost full">Disconnect bot</button>
  </section>

  <script src="popup.js"></script>
</body>
</html>
